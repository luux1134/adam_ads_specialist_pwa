  <style>
    :root{--bg:#1f1a17;--card:#26211e;--card2:#332e2c;--accent:#f4d8a8;--txt:#fcf8f1;--sec:#908b84;--border:#332e2c;--g:#4caf7d;--r:#e05c5c;--o:#e8a64c;--b:#65b8ff}

    button{font:inherit}.refresh{background:transparent;color:var(--accent);border:1px solid var(--border);border-radius:6px;padding:9px 12px;margin:0 0 12px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}.refresh:hover{border-color:var(--accent);background:rgba(244,216,168,.08)}.wrap{min-height:100vh;background:var(--bg);padding:18px 14px 40px}.shell{max-width:1120px;margin:0 auto}
    .hdr{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .brand{display:flex;align-items:center;gap:10px}.mark{display:none}.name{font-family:"Cormorant Garamond",serif;font-size:23px;font-weight:300;font-style:italic;color:var(--accent);letter-spacing:.1em;white-space:nowrap;line-height:1}.sub{font-size:10px;color:var(--sec);letter-spacing:.16em;text-transform:uppercase;margin-top:4px}
    .stamp{text-align:right;font-size:10px;color:var(--sec);letter-spacing:.16em;text-transform:uppercase;line-height:1.6}.stamp b{display:inline-block;margin-top:4px;color:var(--accent);font-weight:400}
    .tabs{position:sticky;top:0;z-index:5;display:flex;gap:3px;margin-bottom:20px;background:rgba(38,33,30,.96);padding:4px;border:1px solid var(--border);border-radius:8px;overflow-x:auto;scrollbar-width:none;backdrop-filter:blur(12px)}.tabs::-webkit-scrollbar{display:none}
    .tab{padding:8px 13px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sec);cursor:pointer;border-radius:5px;border:0;background:transparent;white-space:nowrap}.tab:hover{color:var(--txt);background:var(--card2)}.tab.on{color:#1f1a17;background:var(--accent)}
    .view{display:none}.view.on{display:block}.sec{font-size:9px;color:var(--sec);letter-spacing:.2em;text-transform:uppercase;margin:20px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
    .sg{font-size:10px;color:var(--sec);letter-spacing:.15em;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px}.sg:after{content:"";flex:1;height:1px;background:var(--border)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:4px}.card{min-height:108px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;overflow:hidden}.label{font-size:9px;color:var(--sec);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}.value{font-family:"Cormorant Garamond",serif;font-size:27px;font-weight:300;font-style:italic;color:var(--accent);line-height:1;margin-bottom:5px}.meta{font-size:10px;color:var(--sec);line-height:1.4;margin-top:0}.ref{font-size:10px;color:var(--sec);line-height:1.35;margin-top:6px}.delta{font-size:10px;line-height:1.35;margin-top:4px}.delta.good{color:var(--g)}.delta.bad{color:var(--r)}.delta.neutral{color:var(--sec)}
    .pill{font-size:9px;letter-spacing:.12em;text-transform:uppercase;border-radius:4px;padding:4px 10px;white-space:nowrap;font-weight:600;display:inline-flex;align-items:center;gap:6px}.fix,.bad{background:rgba(224,92,92,.18);color:var(--r)}.scale,.good{background:rgba(76,175,125,.16);color:var(--g)}.hold,.warn{background:rgba(232,166,76,.18);color:var(--o)}.investigate,.info{background:rgba(101,184,255,.15);color:var(--b)}.neutral{background:rgba(144,139,132,.15);color:var(--sec)}
    .hero{background:linear-gradient(180deg,rgba(244,216,168,.08),rgba(38,33,30,0));border:1px solid rgba(244,216,168,.22);border-radius:8px;padding:15px 16px;margin-bottom:12px;overflow:hidden}.heroTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:9px;flex-wrap:wrap}.heroTitle{font-size:10px;color:var(--accent);letter-spacing:.16em;text-transform:uppercase}.priority{font-size:13px;color:var(--txt);line-height:1.45;font-weight:500;min-width:0;word-break:break-word;max-width:760px}.advice p{font-size:12px;color:var(--txt);line-height:1.7;margin:0 0 9px;max-width:75ch}.advice p:last-child{margin-bottom:0}
    .stage{border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;background:rgba(38,33,30,.55)}.stageHead{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:9px}.stageTitle{font-size:10px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;font-weight:600}
    .row{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:11px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:7px}.rmain{min-width:0;flex:1}.rname{font-size:12px;color:var(--txt);font-weight:500;word-break:break-word}.rnote{font-size:10px;color:var(--sec);line-height:1.5;margin-top:4px;overflow-wrap:anywhere}.metrics{display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}.metric{font-size:10px;color:var(--sec);white-space:nowrap}.metric b{font-family:"Cormorant Garamond",serif;font-size:15px;font-style:italic;color:var(--accent);font-weight:300}
    .action{font-size:10px;color:var(--accent);line-height:1.45;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);overflow-wrap:anywhere}.copy{font-family:"Plus Jakarta Sans",system-ui,sans-serif;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--txt);padding:11px 14px;margin-bottom:7px;font-size:12px;line-height:1.5;display:flex;justify-content:space-between;gap:10px;overflow-wrap:anywhere}.count{color:var(--sec);font-size:10px;white-space:nowrap}.empty{background:var(--card);border:1px dashed var(--border);border-radius:8px;padding:16px;color:var(--sec);font-size:12px;line-height:1.6;margin-bottom:8px}.loading{min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--accent);font-family:"Cormorant Garamond",serif;font-size:28px;font-style:italic}
    @media(max-width:640px){.wrap{padding:14px 10px 28px}.name{font-size:20px}.hdr{align-items:flex-start}.stamp{text-align:left}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.card{padding:12px;min-height:100px}.value{font-size:24px}.row{flex-direction:column;align-items:flex-start}.metrics{width:100%;justify-content:flex-start;gap:7px}.metric{white-space:normal}.copy{flex-direction:column}.count{white-space:normal}.priority{font-size:12px}.advice p{font-size:11px}.tab{padding:8px 13px}}
  </style>
</head>
<body>
<div id="app" class="loading">ADAM charge les signaux Ads...</div>
<script>
const API_KEY="AIzaSyADK3alDzNTsEkbKGVDbrdHYBj0esGF0KU";
const SHEET_ID="17j732Xnp48sOWR_ignS3pgc5eKL4OPCJwUJWKH5Euv4";
const SHEETS={advice:"ADAM_Advice",account:"GAds_Account_Daily",campaigns:"GAds_Campaigns",adGroups:"GAds_AdGroups",keywords:"GAds_Keywords",keywordConversions:"GAds_Keyword_Conversions",terms:"GAds_SearchTerms",searchTermConversions:"GAds_SearchTerm_Conversions",pmaxTerms:"GAds_PMax_SearchTerms",negativeKeywords:"GAds_NegativeKeywords",campaignStatus:"GAds_Campaign_Status",ads:"GAds_Ads",adAssets:"GAds_AdAssets",assetGroups:"GAds_AssetGroups",assetGroupAssets:"GAds_AssetGroupAssets",devices:"GAds_Devices",hours:"GAds_Hours",locations:"GAds_Locations",landing:"GAds_LandingPages",funnel:"GA4_Ads_Funnel",objectifs:"Objectifs",actionLog:"ADAM_Action_Log"};
const CKEY="adam-cache-v60",TTL=36e5;
const DEFAULT_DAILY_BUDGET_EUR=30;
const app=document.getElementById("app");
const NF=new Intl.NumberFormat("fr-FR");
const EU=new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0});
const EU_CENTS=new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",minimumFractionDigits:2,maximumFractionDigits:2});

document.addEventListener("DOMContentLoaded",init);
async function init(){
  if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").then(r=>r.update()).catch(()=>{});
  try{render(await load());}catch(e){const c=cacheRead();if(c)render(c.d,true);else app.innerHTML=`<div class="wrap"><div class="empty">Erreur chargement ADAM.<br>${esc(e.message)}</div></div>`}
}
async function load(force=false){
  const c=cacheRead();if(!force&&c&&Date.now()-c.t<TTL)return c.d;
  const pairs=[];
  for(const [k,n] of Object.entries(SHEETS)){
    pairs.push([k,await fetchSheet(n)]);
    await sleep(90);
  }
  const data=Object.fromEntries(pairs);cacheWrite(data);return data;
}
async function fetchSheet(name){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(name)}!A:Z?valueRenderOption=UNFORMATTED_VALUE&key=${API_KEY}`;
  for(let i=0;i<4;i++){
    const res=await fetch(url);
    if(res.ok){const values=(await res.json()).values||[];return rowsToObjects(values)}
    if(res.status===400||res.status===404)return[];
    if(res.status===429||res.status===503){await sleep(650*(i+1));continue}
    throw new Error(`${name}:${res.status}`);
  }
  return [];
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function rowsToObjects(values){if(!values.length)return[];const headers=values[0].map(x=>String(x||"").trim());return values.slice(1).filter(r=>r.some(Boolean)).map(r=>{const o={};headers.forEach((h,i)=>o[h]=dateHeader(h)?normDate(r[i]):r[i]??"");return o})}
function dateHeader(h){return String(h).toLowerCase()==="date"}function normDate(v){if(typeof v==="number"){const d=new Date(Math.round((v-25569)*86400*1000));return d.toISOString().slice(0,10)}return String(v||"").slice(0,10)}
function cacheRead(){try{return JSON.parse(sessionStorage.getItem(CKEY)||"")}catch{return null}}function cacheWrite(d){try{sessionStorage.setItem(CKEY,JSON.stringify({t:Date.now(),d}))}catch{}}
async function refreshAdam(){sessionStorage.removeItem(CKEY);app.innerHTML=`<div class="wrap"><div class="empty">Rafraichissement ADAM...</div></div>`;try{render(await load(true))}catch(e){app.innerHTML=`<div class="wrap"><div class="empty">Erreur refresh ADAM.<br>${esc(e.message)}</div></div>`}}

function render(raw,offline=false){
  const m=model(raw);app.className="wrap";app.innerHTML=`<div class="shell">
    <div class="hdr"><div class="brand"><div class="mark">A</div><div><div class="name">ADAM</div><div class="sub">Ads Decision & Acquisition Manager</div></div></div><div class="stamp">${offline?"Cache local":"Google Ads Specialist"}<br><b>${m.latest||"data manquante"}</b></div></div>
    <div class="tabs">${tab("cmd","Aujourd'hui",true)}${tab("funnel","Tunnel Ads")}${tab("waste","Budget perdu")}${tab("terms","Top requêtes")}${tab("camps","Campagnes")}${tab("creative","Créa & Structure")}${tab("data","Santé data")}</div>
    ${vCommand(m)}${vFunnel(m)}${vWaste(m)}${vTerms(m)}${vCampaigns(m)}${vCreative(m)}${vData(m)}
  </div>`}
function tab(id,label,on=false){return`<button class="tab ${on?"on":""}" onclick="sw('${id}',this)">${label}</button>`}
function sw(id,btn){document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));document.querySelector(`#v-${id}`).classList.add("on");document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));btn.classList.add("on");scrollTo(0,0)}

function model(raw){
  const latest=latestDate([raw.campaigns,raw.terms,raw.pmaxTerms,raw.account].flat());
  const dailyBudget=readDailyBudget(raw.objectifs);
  const s=latest?shift(latest,-6):"",ps=latest?shift(latest,-13):"",pe=latest?shift(latest,-7):"";
  const campaigns=range(raw.campaigns,s,latest),terms=range(raw.terms,s,latest),pmax=range(raw.pmaxTerms,s,latest),keywords=range(raw.keywords,s,latest),keywordConversions=range(raw.keywordConversions,s,latest),searchTermConversions=range(raw.searchTermConversions,s,latest),ads=range(raw.ads,s,latest),adAssets=range(raw.adAssets,s,latest),assetGroups=range(raw.assetGroups,s,latest),assetGroupAssets=range(raw.assetGroupAssets,s,latest),funnel=range(raw.funnel,s,latest);
  const prevCampaigns=range(raw.campaigns,ps,pe),prevTerms=range(raw.terms,ps,pe),prevKeywords=range(raw.keywords,ps,pe);
  const total=sumPerf(campaigns),prevTotal=sumPerf(prevCampaigns),advice=latestAdvice(raw.advice);
  const campaignStatuses=mergeCampaignStatuses(latestCampaignStatuses(raw.campaignStatus),latestCampaignStatuses(raw.campaigns));
  const activeTerms=terms.concat(pmax).filter(r=>isStatusActive(campaignStatuses,r.Campaign));
  const campRows=withPrevious(aggregateBy(campaigns,["Campaign"],"campaign"),aggregateBy(prevCampaigns,["Campaign"],"campaign"));
  const termRows=aggregateTerms(activeTerms);
  const keyRows=aggregateBy(keywords.filter(r=>isStatusActive(campaignStatuses,r.Campaign)),["Keyword","Match type","Campaign","Ad group"],"keyword");
  const prevKeyRows=aggregateBy(prevKeywords,["Keyword","Match type","Campaign","Ad group"],"keyword");
  const funnelRows=aggregateFunnel(funnel),keywordSignalRows=aggregateSignals(keywordConversions,"Keyword"),searchTermSignalRows=aggregateSignals(searchTermConversions,"Search term");
  const m={raw,latest,dailyBudget,total,prevTotal,trend:trend(total,prevTotal),advice,terms:termRows,campaigns:campRows,keywords:keyRows,prevKeywords:prevKeyRows,keywordSignals:keywordSignalRows,searchTermSignals:searchTermSignalRows,negativeRules:raw.negativeKeywords||[],campaignStatuses,ads,adAssets,assetGroups,assetGroupAssets,funnel:funnelRows,actionLog:recentActionRows(raw.actionLog,latest),missing:missing(raw)};
  m.waste=waste(m,termRows,campRows,keyRows);m.opps=opportunities(termRows,campRows,keyRows);m.negatives=negativeKeywords(termRows,m);m.modes=modeSummary(campRows);m.funnelDiagnosis=buildFunnelDiagnosis(campRows,funnelRows,campaignStatuses,m);m.working=workingSignals(m);m.doNotTouch=doNotTouchRows(m);m.pausedRisks=pausedCampaignRisks(m);m.logicalPauses=logicalPauses(m);m.activeCampaigns=activeCampaignRecap(m);m.decisionLocks=decisionLocks(m);m.globalLock=globalDecisionLock(m);m.budgetDecision=budgetDecision(m);m.todos=campaignTodos(m);m.campaignCreation=campaignCreation(m);m.creative=creativeDiagnosis(m);
  return m;
}
function readDailyBudget(rows){const fallback=DEFAULT_DAILY_BUDGET_EUR;for(const r of rows||[]){const joined=Object.values(r).join(" ").toLowerCase();if((joined.includes("google ads")||joined.includes("gads")||joined.includes("ads"))&&(joined.includes("budget")||joined.includes("jour")||joined.includes("daily"))){const n=firstLooseNumber(Object.values(r));if(n>0)return n}}for(const r of rows||[]){for(const k of Object.keys(r)){if(/google ads daily budget|daily budget|budget ads|budget google ads|budget journalier/i.test(k)){const n=looseNumber(r[k]);if(n>0)return n}}}return fallback}
function firstLooseNumber(values){for(const v of values){const n=looseNumber(v);if(n>0)return n}return 0}
function looseNumber(v){const n=Number(String(v??"").replace(",",".").replace(/[^\d.-]/g,""));return Number.isFinite(n)?n:0}
function recentActionRows(rows,latest){const floor=latest?shift(latest,-2):"";return(rows||[]).filter(r=>{const d=normDate(r.Date||r.date||r["Action date"]||"");const s=String(r.Status||r.status||"").toLowerCase();return s==="pending"||s==="en cours"||s==="open"||d&&(!floor||d>=floor)}).slice(-20)}
function decisionLocks(m){const out=[];if(m.missing.includes("GAds_Campaigns")||!m.latest)out.push({type:"DATA LOCK",cls:"bad",campaign:"Google Ads",reason:"Données campagnes absentes ou sans date exploitable.",action:"Importer GAds_Campaigns avant toute décision budget."});const funnelLatest=latestDate(m.raw.funnel||[]);if(m.latest&&funnelLatest&&funnelLatest<m.latest)out.push({type:"WAIT",cls:"warn",campaign:"GA4_Ads_Funnel",reason:`Funnel GA4 en retard (${funnelLatest} vs Ads ${m.latest}).`,action:"Ne pas trancher landing/checkout sur la dernière journée."});m.actionLog.forEach(a=>{const campaign=a.Campaign||a.campaign||a.Campagne||"";if(!campaign)return;const change=a.Change||a.change||a.Object||a.object||a["Action type"]||a.Type||"modification récente";out.push({type:"WAIT",cls:"investigate",campaign,reason:`Action récente: ${change}.`,action:"Attendre 48h/J+3 avant nouvelle modification, sauf fuite cash claire."})});return out.slice(0,8)}
function lockForCampaign(m,name){return(m.decisionLocks||[]).find(x=>normName(x.campaign)===normName(name))}
function globalDecisionLock(m){const hard=(m.decisionLocks||[]).find(x=>x.type==="DATA LOCK");if(hard)return{locked:true,cls:"bad",label:"DATA LOCK",reason:hard.reason,allowed:"Corriger la collecte avant décision budget."};const wait=(m.decisionLocks||[]).find(x=>x.type==="WAIT");if(wait)return{locked:true,cls:"warn",label:"PRUDENCE",reason:wait.reason,allowed:"Ne décide pas sur le funnel aujourd'hui. Tu peux quand même exclure les requêtes toxiques claires."};return{locked:false,cls:"good",label:"OK",reason:"Aucun point de prudence bloquant.",allowed:"Actions possibles si volume suffisant."}}
function vCommand(m){const a=m.advice;return`<div class="view on" id="v-cmd"><div class="sec">Aujourd'hui</div>${a?`<div class="hero"><div class="heroTop"><div><div class="heroTitle">Decision du jour</div><div class="priority">${esc(a.Priority||"")}</div></div><div>${pill(a.Verdict||"INVESTIGATE")} ${conf(a.Confidence||"Low")}</div></div><div class="advice">${paras(a.Advice)}</div></div>`:`<div class="empty">Aucune ligne ADAM_Advice. Lance syncAdamAdvice apres la collecte Ads.</div>`}
  ${m.globalLock.locked?`<div class="sg">Point de prudence</div>${prudenceRow(m.globalLock)}`:""}
  <div class="sg">Score rapide 7 jours</div><div class="grid">${scoreCard("Spend",m.total.cost,m.prevTotal.cost,"money",false)}${scoreCard("Revenue Ads",m.total.value,m.prevTotal.value,"money")}${scoreCard("ROAS",m.total.roas,m.prevTotal.roas,"x")}${scoreCard("Purchases",m.total.pur,m.prevTotal.pur,"num")}${scoreCard("CPA",m.total.cpa,m.prevTotal.cpa,"money",false)}${scoreCard("CTR",m.total.ctr,m.prevTotal.ctr,"pct")}</div>
  <div class="sg">Budget du jour</div>${budgetDecisionRow(m.budgetDecision,true)}
  <div class="sg">7 jours par campagne active</div>${m.activeCampaigns.map(campaignMiniRow).join("")||`<div class="empty">Aucune campagne active avec donnees sur 7 jours.</div>`}
  <div class="sg">Aujourd'hui : 3 actions max</div>${priorityRows(m).map(actionRow).join("")||`<div class="empty">Pas assez de donnees pour prioriser.</div>`}
  </div>`}
function vFunnel(m){const rows=m.funnelDiagnosis;return`<div class="view" id="v-funnel"><div class="sec">Tunnel Ads</div>${funnelBrief(rows)}<div class="sg">Lecture par étape · campagnes actives · 7 derniers jours Ads</div>${funnelStageSections(rows)}</div>`}
function vWaste(m){const heroCampaign=m.waste.campaigns[0],campaignRows=m.waste.campaigns.filter(c=>!heroCampaign||c.name!==heroCampaign.name);return`<div class="view" id="v-waste"><div class="sec">Budget perdu</div>${wasteBrief(m)}<div class="sg">Requêtes à exclure · campagnes actives</div>${m.negatives.slice(0,10).map(negativeRow).join("")||`<div class="empty">Aucune requete toxique active detectee. C est possible: soit peu de volume, soit les exclusions sont deja propres.</div>`}<div class="sg">Requêtes à encadrer</div>${m.waste.terms.slice(0,10).map(termWasteRow).join("")||`<div class="empty">Aucune requete utile avec spend significatif a isoler ou surveiller.</div>`}<div class="sg">Mots-clés à restreindre / isoler</div>${m.waste.keywords.slice(0,10).map(wasteRow).join("")||`<div class="empty">Aucun mot-cle actif assez mauvais statistiquement pour recommander une restriction.</div>`}<div class="sg">Campagnes à inspecter</div>${campaignRows.slice(0,8).map(wasteRow).join("")||`<div class="empty">${heroCampaign?"Campagne prioritaire deja affichee en resume ci-dessus.":"Aucune campagne active avec budget a controler selon les seuils actuels."}</div>`}</div>`}
function vTerms(m){return`<div class="view" id="v-terms"><div class="sec">Top requêtes</div><div class="sg">Requêtes avec signal · quoi faire</div>${m.searchTermSignals.slice(0,20).map(signalRow).join("")||`<div class="empty">Aucune requete avec achat / ATC / checkout detectee.</div>`}<div class="sg">Requêtes à isoler / surveiller</div>${topDecisionTerms(m).slice(0,18).map(termRow).join("")||`<div class="empty">Aucune requete exploitable hors signaux et exclusions.</div>`}<div class="empty">Les exclusions sont volontairement sorties d'ici: elles vivent dans Budget perdu. Ici, ADAM ne garde que les requêtes qui peuvent guider structure, annonces, landing ou décision de scale.</div></div>`}
function vCampaigns(m){return`<div class="view" id="v-camps"><div class="sec">Campagnes</div>${campaignBrief(m)}<div class="sg">Décision budget ADAM</div>${budgetDecisionRow(m.budgetDecision)}<div class="sg">Créer une campagne ?</div>${creationRow(m.campaignCreation)}<div class="sg">Pauses suspectes</div>${m.pausedRisks.map(pausedRiskRow).join("")||`<div class="empty">Aucune campagne pausee avec vrai signal business detectee.</div>`}<div class="sg">Actions par campagne active</div>${m.todos.map(todoRow).join("")||`<div class="empty">Aucune campagne active avec donnees sur 7 jours.</div>`}</div>`}

function priorityRows(m){const out=[],actionableNegatives=(m.negatives||[]).filter(x=>x.priority!=="preventive");if(m.missing.includes("GAds_Campaigns"))out.push({t:"Verifier la collecte Ads",n:"GAds_Campaigns est vide ou absent.",k:"INVESTIGATE",c:"investigate",i:"eleve",r:"faible",cf:"haute",next:"Si GAds_Campaigns revient avec date recente, relancer la lecture ADAM."});if(actionableNegatives.length){const campaigns=[...new Set(actionableNegatives.slice(0,4).map(x=>x.Campaign).filter(Boolean))].join(" · ")||"campagnes actives";out.push({t:`Exclure low-cost · ${campaigns}`,n:actionableNegatives.slice(0,4).map(x=>`${fmtKeyword(x.term,x.match)} (${matchLabel(x.match)})`).join(", "),k:"EXCLURE",c:"bad",i:"eleve",r:"faible",cf:"haute",score:78,next:"Si la même campagne dépense encore 1 jour de budget sans checkout/achat, réduire."})}if(m.waste.campaigns.length){const c=m.waste.campaigns[0];out.push({t:`Inspecter avant de couper · ${c.name}`,n:`${c.name}: ${money(c.cost)}, ${fm(c.atc||0)} ATC, ${fm(c.checkout||0)} checkout, 0 achat. Inspecter requetes, panier, frais, reassurance et tracking avant nouveau budget.`,k:"FIX",c:"bad",i:"eleve",r:"moyen",cf:"moyenne",score:65,next:"Si 25 clics supplémentaires restent sans checkout, réduire ou rebuild."})}if(m.waste.keywords.length){const k=m.waste.keywords[0],observed=k.decision==="OBSERVER";out.push({t:`${k.decision==="SPLIT"?"Splitter concurrent":observed?"Observer concurrent déjà isolé":"Restreindre mot-clé faible"} · ${k.Campaign||"campagne Search"}`,n:`${fmtKeyword(k.name,k.matchType)}: ${money(k.cost)}, ${fm(k.clicks)} clics. ${k.action}`,k:k.decision||"RESTREINDRE",c:k.decision==="PAUSE"?"bad":observed?"info":"warn",i:"moyen",r:"moyen",cf:"moyenne",score:k.decision==="SPLIT"?66:k.clicks>=50?62:55,next:observed?"Juger à 25 clics ou 25-30 € de spend; si 0 ATC/checkout, réduire ou exclure exact.":k.decision==="SPLIT"?"Créer test concurrent 3-5 €/j ou exclure exact si tu ne veux pas travailler cette intention.":"Si 10 clics de plus sans ATC/checkout, pause ou passage en exact."})}if(m.waste.terms.length){const t=m.waste.terms[0],hist=historicalSignalForName(m,t.Campaign,t.term),observed=t.decision==="OBSERVER";out.push({t:`${observed?"Observer concurrent déjà isolé":"Isoler requête à risque"} · ${t.Campaign||"campagne Search"}`,n:hist.total?`${fmtKeyword(t.term,t.matchType)}: ${money(t.cost)}, ${fm(t.clicks)} clics sur la fenetre actuelle. Signal historique detecte (${historicalSignalText(hist)}): ne pas exclure, isoler/surveiller en exact.`:`${fmtKeyword(t.term,t.matchType)}: ${money(t.cost)}, ${fm(t.clicks)} clics sur la fenetre actuelle, pas de signal verifie. ${observed?"Déjà dans la structure Conquête Premium: ne pas recréer d'ad group.":t.intent==="CONCURRENT"?"Ne pas laisser dans le non-marque standard.":"Verifier intention et landing."}`,k:t.decision||"INSPECTER",c:observed?"info":t.intent==="CONCURRENT"?"warn":"info",i:"moyen",r:"moyen",cf:"moyenne",score:hist.total?62:55,next:observed?"Juger à 25 clics ou 25-30 € de spend; si 0 ATC/checkout, réduire ou exclure exact.":hist.total?"Si 10 clics de plus sans checkout, garder isolé mais ne pas exclure sans confirmer la perte.":"Si 5 à 10 clics de plus sans signal, isoler plus strictement ou exclure exact."})}if(out.length<3&&m.opps.hot.length){const h=m.opps.hot[0];out.push({t:`Isoler intention chaude · ${h.Campaign||"campagne Search"}`,n:`${fmtKeyword(h.term,h.matchType)} montre un signal utile dans ${h.Campaign||"les requetes Search"}. Creer annonce/ad group dedie, pas scale aveugle.`,k:"ISOLER",c:"good",i:"moyen",r:"faible",cf:"moyenne",score:60,next:"Si 1 checkout apparait, protéger; si 3 achats sur 7 jours, scale +15%."})}const creativeText=`${m.creative.problem||""} ${m.creative.action||""}`;if(out.length<3&&m.creative.mode!=="HOLD"&&m.creative.campaign&&!/ne pas (ré|re)ecrire|ne pas tout|garder en test|surveiller/i.test(creativeText))out.push({t:`Créa · ${m.creative.campaign}`,n:`Probleme detecte: ${m.creative.problem} Action: ${m.creative.action}`,k:"CREA",c:"info",i:"moyen",r:"faible",cf:"moyenne",score:52,next:"Si le probleme reste apres volume suffisant, remplacer les titres/assets faibles."});return out.slice(0,3)}
function actionRow(a){const score=a.score??confidenceScore(null,a),lock=isLockType(a.k);return`<div class="row"><div class="rmain"><div class="rname">${esc(a.t)}</div><div class="rnote">${esc(a.n)}</div><div class="action">Impact ${esc(a.i||"moyen")} · Risque ${esc(a.r||"moyen")} · ${confidenceTitle(a.k)} ${score}/100 · ${confidenceLabel(score,lock)}</div>${a.next?`<div class="action">Prochaine condition: ${esc(a.next)}</div>`:""}</div><span class="pill ${a.c}">${a.k}</span></div>`}
function wasteBrief(m){const keyword=m.waste.keywords[0],campaign=m.waste.campaigns[0],neg=m.negatives.find(x=>x.priority!=="preventive");if(neg)return`<div class="hero"><div class="heroTop"><div><div class="heroTitle">Priorite nettoyage</div><div class="priority">Exclure d abord les requetes low-cost avec coût réel.</div></div><span class="pill bad">${fm(m.negatives.filter(x=>x.priority!=="preventive").length)} requetes</span></div><div class="advice"><p>${esc(neg.term)} depense ${money(neg.cost)} avec une intention incompatible HOLIAE premium.</p><p>Action: ajouter l exclusion recommandee, sans couper large ni toucher aux requetes avec signal ATC/checkout/achat.</p></div></div>`;if(campaign)return`<div class="hero"><div class="heroTop"><div><div class="heroTitle">Budget à contrôler</div><div class="priority">${esc(campaign.name)}</div></div><span class="pill warn">${money(campaign.cost)}</span></div><div class="advice"><p>${esc(campaign.reason)}</p><p>${esc(campaign.action)}</p></div></div>`;if(keyword)return`<div class="hero"><div class="heroTop"><div><div class="heroTitle">Mot-cle à encadrer</div><div class="priority">${esc(keyword.name)}</div></div><span class="pill warn">${esc(keyword.decision)}</span></div><div class="advice"><p>${esc(keyword.reason)}</p><p>${esc(keyword.action)}</p></div></div>`;return`<div class="hero"><div class="heroTop"><div><div class="heroTitle">Lecture budget</div><div class="priority">Aucune fuite nette detectee sur les campagnes actives.</div></div><span class="pill good">OK</span></div><div class="advice"><p>Les requêtes non pertinentes à coût faible restent visibles en exclusion préventive, mais ne doivent pas piloter la priorité budget.</p></div></div>`}
function funnelBrief(rows){if(!rows.length)return`<div class="empty">Pas de diagnostic tunnel disponible sur campagne active. Ce n est pas forcement un probleme Ads: il manque surtout une lecture GA4 exploitable.</div>`;const issues=rows.filter(r=>severity(r)>0&&!lowImpactDisplayBlock(r)).sort((a,b)=>funnelPriorityScore(b)-funnelPriorityScore(a)),top=issues[0];if(top)return`<div class="hero"><div class="heroTop"><div><div class="heroTitle">Blocage prioritaire</div><div class="priority">${esc(top.campaign)} · ${esc(top.diagnostic)}</div></div><span class="pill ${top.cls}">${esc(top.diagnostic)}</span></div><div class="advice"><p>${esc(top.reason)}</p><p>${esc(top.action)}</p></div></div>`;const display=rows.find(lowImpactDisplayBlock);if(display)return`<div class="hero"><div class="heroTop"><div><div class="heroTitle">Lecture tunnel</div><div class="priority">Aucun blocage prioritaire exploitable. Display reste à surveiller.</div></div><span class="pill info">SURVEILLER</span></div><div class="advice"><p>Display montre des vues PDP sans ATC, mais le spend reste sous ${money(50)} et l'impact business est faible.</p><p>Prioriser Search, structure et budget. Garder Display bas, ne pas le traiter comme le blocage principal.</p></div></div>`;return`<div class="hero"><div class="heroTop"><div><div class="heroTitle">Lecture tunnel</div><div class="priority">Aucun blocage exploitable detecte sur les campagnes actives.</div></div><span class="pill good">OK</span></div><div class="advice"><p>Soit le volume est encore faible, soit les campagnes actives avec signal vont deja jusqu a l achat.</p></div></div>`}
function lowImpactDisplayBlock(r){return r&&r.channel==="DISPLAY"&&(r.cost||0)<50&&!((r.atc||0)+(r.checkout||0)+(r.purchases||0))&&severity(r)>0}
function funnelRow(r){return`<div class="row"><div class="rmain"><div class="rname">${esc(r.campaign)}</div><div class="rnote">Blocage: ${esc(r.reason)}</div><div class="action">${esc(r.action)}</div></div><div class="metrics"><span class="pill ${r.cls}">${r.diagnostic}</span><span class="metric">Clicks <b>${fm(r.clicks)}</b></span><span class="metric">Sessions <b>${fm(r.sessions)}</b></span><span class="metric">PDP <b>${fm(r.pdp)}</b></span><span class="metric">ATC <b>${fm(r.atc)}</b></span><span class="metric">Checkout <b>${fm(r.checkout)}</b></span><span class="metric">Achat <b>${fm(r.purchases)}</b></span></div></div>`}
function funnelStageSections(rows){if(!rows.length)return`<div class="empty">Aucune campagne active avec donnees funnel exploitables. Si Ads depense, verifier GA4_Ads_Funnel ou le mapping campagne.</div>`;return funnelStages().map(s=>funnelStageBlock(s,rows)).join("")}
function funnelStages(){return[{title:"Clic Ads -> Session GA4",key:"click_session"},{title:"Session GA4 -> PDP",key:"session_pdp"},{title:"PDP -> ATC",key:"pdp_atc"},{title:"ATC -> Checkout",key:"atc_checkout"},{title:"Checkout -> Achat",key:"checkout_purchase"}]}
function funnelStageBlock(stage,allRows){const rows=allRows.map(r=>funnelStageStatus(stage,r));const issues=rows.filter(r=>r.issue);return`<div class="stage"><div class="stageHead"><div><div class="stageTitle">${esc(stage.title)}</div><div class="rnote">${esc(issues.length?`${issues.length} campagne${issues.length>1?"s":""} a traiter, ${rows.length-issues.length} en lecture OK/faible volume`:"Toutes les campagnes actives sont OK ou sans volume suffisant sur cette etape.")}</div></div><span class="pill ${issues.length?"warn":"good"}">${issues.length?"A traiter":"OK"}</span></div>${rows.map(funnelStageRow).join("")}</div>`}
function funnelStageStatus(stage,r){const out={...r,stage:stage.title,stageLabel:"OK",stageCls:"good",issue:false,stageReason:"Pas de blocage clair sur cette etape.",stageAction:"Ne pas agir sur cette etape seule."};if(stage.key==="click_session"){const ratio=r.clicks?r.sessions/r.clicks:0;if(r.diagnostic==="DATA / MAPPING")return{...out,stageLabel:"MAPPING",stageCls:"investigate",issue:true,stageReason:r.reason,stageAction:r.action};if(r.diagnostic==="MESURE CLIC -> SESSION"||r.clicks>=20&&ratio<.45)return{...out,stageLabel:"A SURVEILLER",stageCls:"info",issue:false,stageReason:`${fm(r.clicks)} clics Ads pour ${fm(r.sessions)} sessions GA4 (${pct(ratio)}).`,stageAction:"Non prioritaire si PDP/ATC sont lus, mais a creuser: consent mode, auto-tagging, delai GA4, vitesse mobile et redirections."};return{...out,stageReason:`${fm(r.clicks)} clics Ads pour ${fm(r.sessions)} sessions GA4.`,stageAction:"Mesure acceptable ou non prioritaire aujourd'hui."}}if(stage.key==="session_pdp"){if(r.diagnostic==="SESSION -> PDP")return{...out,stageLabel:"A TRAITER",stageCls:"warn",issue:true,stageReason:r.reason,stageAction:r.action};if(r.sessions<10)return{...out,stageLabel:"VOLUME FAIBLE",stageCls:"investigate",stageReason:"Trop peu de sessions pour juger proprement session -> PDP.",stageAction:"Attendre plus de sessions avant decision."};return{...out,stageReason:`${fm(r.sessions)} sessions pour ${fm(r.pdp)} vues PDP.`,stageAction:"Pas de blocage net session -> PDP."}}if(stage.key==="pdp_atc"){const rate=r.pdp?r.atc/r.pdp:0;if(r.diagnostic==="PDP -> ATC"&&r.channel==="DISPLAY"&&r.cost<50)return{...out,stageLabel:"A SURVEILLER",stageCls:"info",issue:false,stageReason:`Display: ${fm(r.pdp)} vues PDP, 0 ATC, mais seulement ${money(r.cost)} de spend.`,stageAction:"Garder bas. Attendre plus de volume avant de traiter comme probleme PDP/asset."};if(r.diagnostic==="PDP -> ATC")return{...out,stageLabel:"A TRAITER",stageCls:"bad",issue:true,stageReason:r.reason,stageAction:r.action};if(r.pdp<20)return{...out,stageLabel:"VOLUME FAIBLE",stageCls:"investigate",stageReason:"Pas assez de vues PDP pour conclure sur l'ajout panier.",stageAction:"Attendre plus de volume ou lire qualitativement la landing."};if(r.pdp>=50&&r.atc>0&&rate<.05)return{...out,stageLabel:"A SURVEILLER",stageCls:"info",stageReason:`${fm(r.pdp)} vues PDP pour ${fm(r.atc)} ATC (${pct(rate)}).`,stageAction:"Signal ATC present mais fragile. Ne pas juger la PDP seule: analyser requetes, prix, reassurance et panier."};return{...out,stageReason:`${fm(r.pdp)} vues PDP pour ${fm(r.atc)} ATC.`,stageAction:"Pas de fuite PDP -> ATC prioritaire."}}if(stage.key==="atc_checkout"){if(r.diagnostic==="ATC -> CHECKOUT")return{...out,stageLabel:"A TRAITER",stageCls:"warn",issue:true,stageReason:r.reason,stageAction:r.action};if(r.atc<1)return{...out,stageLabel:"PAS D'ATC",stageCls:"neutral",stageReason:"Aucun ATC: impossible de juger le passage panier -> checkout.",stageAction:"Regarder d'abord PDP -> ATC."};return{...out,stageReason:`${fm(r.atc)} ATC pour ${fm(r.checkout)} checkout.`,stageAction:"Pas de fuite ATC -> checkout prioritaire."}}if(stage.key==="checkout_purchase"){if(r.diagnostic==="CHECKOUT -> ACHAT")return{...out,stageLabel:"A TRAITER",stageCls:"bad",issue:true,stageReason:r.reason,stageAction:r.action};if(r.checkout<1)return{...out,stageLabel:"PAS DE CHECKOUT",stageCls:"neutral",stageReason:"Aucun checkout: impossible de juger checkout -> achat.",stageAction:"Regarder d'abord les etapes avant checkout."};return{...out,stageReason:`${fm(r.checkout)} checkout pour ${fm(r.purchases)} achat.`,stageAction:"Pas de fuite checkout -> achat prioritaire."}}return out}

function campaignCreation(m){const budget=m.dailyBudget||DEFAULT_DAILY_BUDGET_EUR,activeNames=m.activeCampaigns.map(c=>c.name).join(" · ")||"aucune campagne active";if(m.globalLock&&m.globalLock.locked)return{type:"RESTER",cls:m.globalLock.cls,confidence:"Haute",score:confidenceScore(m,{kind:"lock"}),budget,title:"Ne pas créer de campagne sous verrou",why:m.globalLock.reason,action:"Rester sur les campagnes actives. Seules actions autorisées: exclusion toxique claire ou correction data/tracking.",next:"Créer seulement quand le verrou disparaît et qu'une intention isolée justifie une réallocation budget."};const hasCompetitorCampaign=m.activeCampaigns.some(c=>/concurrent|competitor|nooance|currentbody/i.test(c.name));const competitor=m.terms.filter(t=>t.intent==="CONCURRENT"&&(t.cost>=5||t.clicks>=5)).sort((a,b)=>b.cost-a.cost);const hot=m.terms.filter(t=>["CHAUD","COMMERCIAL"].includes(t.intent)&&(t.clicks>=8||t.cost>=8)).sort((a,b)=>b.clicks-a.clicks||b.cost-a.cost);const hasSearch=m.activeCampaigns.some(c=>campaignType(c)==="SEARCH"),canSplit=m.activeCampaigns.length<=2;if(competitor.length&&!hasCompetitorCampaign&&canSplit&&m.waste.campaigns.length){const terms=competitor.slice(0,5).map(t=>fmtKeyword(t.term,t.matchType)).join(", ");return{type:"PREPARER",cls:"warn",confidence:"Moyenne",score:64,budget,title:"Préparer un test concurrents, pas le lancer en priorité",why:`La Search active est déjà à inspecter. Les requêtes concurrentes brouillent le non-marque (${terms}), mais avec ${money(budget)}/j il faut d'abord contrôler la campagne principale.`,action:"Préparer un ad group/campagne Concurrents en exact/expression. Le lancer seulement si tu déplaces 3-5 €/j depuis la Search standard après nettoyage.",next:"Lancer si Search V2 est nettoyée et que le budget est déplacé depuis Search standard, ou si CurrentBody/Nooance génèrent un nouveau signal fort. Stop à 25 clics sans signal."}}if(competitor.length&&!hasCompetitorCampaign&&canSplit){const terms=competitor.slice(0,5).map(t=>fmtKeyword(t.term,t.matchType)).join(", ");return{type:"CREER TEST",cls:"warn",confidence:"Moyenne",score:68,budget,title:"Créer une micro-campagne Search Concurrents",why:`Budget actuel ${money(budget)}/j: on ne disperse pas. Mais ces requêtes concurrentes brouillent la Search standard: ${terms}.`,action:"Créer seulement si tu acceptes de déplacer 3-5 €/j depuis la Search standard. Exact/expression uniquement, budget test faible.",next:"Stop à 25 clics sans ATC/checkout; scale interdit avant 3 achats."}}if(competitor.length&&!hasCompetitorCampaign){const terms=competitor.slice(0,4).map(t=>fmtKeyword(t.term,t.matchType)).join(", ");return{type:"RESTER",cls:"warn",confidence:"Moyenne",score:62,budget,title:"Ne pas créer encore: budget trop fragmenté",why:`Avec ${money(budget)}/j, une nouvelle campagne risque de diluer l'apprentissage. Requêtes concurrentes détectées: ${terms}.`,action:"Rester sur les campagnes actives. Ajouter ces termes en négatifs exacts ou les isoler en ad group avant de créer une campagne séparée.",next:"Reconsidérer si les concurrents atteignent 5+ clics propres ou 1 ATC/checkout."}}if(hot.length&&!hasSearch){const terms=hot.slice(0,5).map(t=>fmtKeyword(t.term,t.matchType)).join(", ");return{type:"CREER TEST",cls:"good",confidence:"Moyenne",score:70,budget,title:"Créer une Search intention chaude",why:`Pas de Search active claire et des requêtes commerciales apparaissent: ${terms}.`,action:"Créer une Search serrée en exact/expression avec 20-25 €/j max, en gardant le reste en retarget/display. Pas de broad au départ.",next:"Si 25 clics sans ATC/checkout, réduire; si 3 achats, scale +15%."}}if(hot.length){const terms=hot.slice(0,4).map(t=>fmtKeyword(t.term,t.matchType)).join(", ");return{type:"RESTER",cls:"good",confidence:"Moyenne",score:66,budget,title:"Ne pas créer de nouvelle campagne pour l’instant",why:`Avec ${money(budget)}/j, le meilleur move est de concentrer le budget sur ce qui existe. Requêtes utiles: ${terms}.`,action:`Rester sur: ${activeNames}. Isoler en ad groups dédiés avant de créer une nouvelle campagne. Monter le budget seulement si achat/ATC/checkout se confirment.`,next:"Créer une campagne dédiée seulement si l'ad group isolé confirme un checkout ou 3 achats."}}return{type:"RESTER",cls:"neutral",confidence:"Moyenne",score:58,budget,title:"Pas de nouvelle campagne aujourd’hui",why:`Budget actuel ${money(budget)}/j: sans signal fort, créer une campagne ajoute surtout de la dispersion.`,action:`Rester sur: ${activeNames}. Nettoyer les requêtes, protéger le budget et attendre un signal plus net avant de créer.`,next:"Revoir après 25 clics supplémentaires ou apparition d'un ATC/checkout."}}
function campaignTodos(m){const urgentByCampaign={};m.pausedRisks.forEach(r=>urgentByCampaign[normName(r.name)]={campaign:r.name,type:"VERIFIER PAUSE",cls:"bad",task:"Pause suspecte: la campagne avait un vrai signal business. Verifier avant de la laisser eteinte.",impact:"eleve",risk:"moyen",confidence:r.pur?"haute":"moyenne",cost:r.cost,clicks:r.clicks,impr:r.impr,pur:r.pur,roas:r.cost?r.value/r.cost:0});m.waste.campaigns.forEach(c=>urgentByCampaign[normName(c.name)]={campaign:c.name,type:"INSPECTER",cls:"warn",task:c.action,impact:"eleve",risk:"moyen",confidence:"moyenne",cost:c.cost,clicks:c.clicks,impr:c.impr,atc:c.atc,checkout:c.checkout,pur:c.pur,roas:0});m.waste.keywords.forEach(k=>{const cName=k.Campaign||"";if(!cName||urgentByCampaign[normName(cName)])return;urgentByCampaign[normName(cName)]={campaign:cName,type:k.decision,cls:k.decision==="PAUSE"?"bad":"warn",task:`${fmtKeyword(k.name,k.matchType)}: ${k.action}`,impact:"moyen",risk:"moyen",confidence:"moyenne",cost:k.cost,clicks:k.clicks,impr:k.impr,pur:0,roas:0}});const out=[];m.activeCampaigns.forEach(c=>{const k=normName(c.name),u=urgentByCampaign[k];if(u){out.push(u);return}out.push(campaignTypeTodo(m,c))});return out.slice(0,20)}
function campaignTypeTodo(m,c){const budget=m.dailyBudget||DEFAULT_DAILY_BUDGET_EUR,channel=campaignType(c),terms=topTermsForCampaign(m,c.name),bad=terms.find(t=>t.intent==="TOXIQUE"&&t.cost>0),competitor=terms.find(t=>t.intent==="CONCURRENT"&&(t.cost>=3||t.clicks>=3)),hot=terms.find(t=>["CHAUD","COMMERCIAL"].includes(t.intent)&&(t.clicks>=5||t.cost>=5)),hasSignal=c.pur>=1||c.atc+c.checkout>0,bid=biddingAdvice(m,c),lock=lockForCampaign(m,c.name),criticalCash=c.cost>=budget*2&&!hasSignal,funnel=(m.funnelDiagnosis||[]).find(f=>normName(f.campaign)===normName(c.name))||{},funnelPdpNoAtc=funnel.diagnostic==="PDP -> ATC"||funnel.pdp>=20&&!funnel.atc&&!hasSignal;if(lock&&!criticalCash){const x={campaign:c.name,type:"WAIT",cls:"investigate",task:`${lock.reason} ${lock.action}`,impact:"moyen",risk:"faible",confidence:"haute",cost:c.cost,pur:c.pur,roas:c.roas,bid,next:"Reprendre décision après 48h/J+3 ou si fuite cash nette."};x.score=confidenceScore(m,x);return x}let type=hasSignal?"PROTEGER":"RIEN A FAIRE",cls=hasSignal?"good":"neutral",task=hasSignal?c.note:"Pas d'action campagne aujourd'hui. Laisser tourner et attendre plus de volume avant modification.",impact=hasSignal?"moyen":"faible",risk="faible",confidence="moyenne";if(channel==="SEARCH"){if(bad){type="EXCLURE";cls="bad";task=`Search: exclure ${fmtKeyword(bad.term,bad.matchType)} si c'est bien low-cost/non-fit. Garder le niveau campagne si le mot peut exister dans une bonne requete.`;impact="eleve";risk="faible";confidence="haute"}else if(competitor){const isolated=isCompetitorIsolated(competitor);type=isolated?"OBSERVER":"SEPARER";cls=isolated?"info":"warn";task=isolated?`Search: ${fmtKeyword(competitor.term,competitor.matchType)} est déjà dans la structure Conquête Premium. Ne pas recréer; surveiller jusqu'à 25 clics ou 25-30 € de spend.`:`Search: sortir ${fmtKeyword(competitor.term,competitor.matchType)} du non-marque standard. Créer ad group/campagne concurrent dédié ou l'exclure exact si tu ne veux pas le travailler.`;impact="moyen";risk=isolated?"faible":"moyen"}else if(hot){type="ISOLER";cls="good";task=`Search: isoler ${fmtKeyword(hot.term,hot.matchType)} dans un ad group exact/expression avec RSA spécifique preuve produit.`;impact="moyen";risk="faible"}else if(c.clicks>=20&&!hasSignal){type="REECRIRE";cls="warn";task="Search: pas de signal business. Relire les termes, réduire le broad, ajouter titres RSA plus filtrants autour de premium + preuve produit.";impact="moyen";risk="moyen"}}else if(channel==="PERFORMANCE_MAX"){if(c.cost>=budget*2&&!hasSignal){type="REDUIRE";cls="bad";task="PMax: réduire ou garder budget minimal. Vérifier asset groups, signaux audience, flux produit et search themes avant d'ajouter du budget.";impact="eleve";risk="moyen"}else if(hasSignal){type="PROTEGER";cls="good";task="PMax: protéger le budget. Ne scaler que +15/20% si 3 achats minimum et asset groups propres.";impact="moyen";risk="faible"}else{task="PMax: volume faible ou opaque. Ne pas créer d'asset group théorique; attendre signal ou inspecter assets faibles."}}else if(channel==="SHOPPING"){if(c.cost>=budget*2&&!hasSignal){type="FLUX";cls="warn";task="Shopping: vérifier titres produit, images, prix, flux Merchant Center et requêtes produit avant réduction forte.";impact="moyen";risk="moyen"}else if(hasSignal){type="PROTEGER";cls="good";task="Shopping: protéger les produits qui vendent. Tester budget seulement si CPA/contribution OK.";impact="moyen";risk="faible"}else{task="Shopping: laisser tourner si peu de volume; ne pas toucher au flux sans signal."}}else if(channel==="DISPLAY"){if(funnelPdpNoAtc||c.clicks>=50&&!hasSignal||c.cost>=budget&&!hasSignal){type="SURVEILLER";cls="warn";task="Display: clics/PDP sans ATC. Garder budget bas, verifier placements et assets, ne pas scaler tant qu'il n'y a pas ATC/checkout.";impact="faible";risk="faible"}else if(hasSignal){type="PROTEGER";cls="good";task="Display: signal utile détecté. Garder comme soutien/retargeting, pas comme moteur principal tant que volume faible.";impact="faible";risk="faible"}else{task="Display: rien à faire. Garder en observation, budget contrôlé."}}const x={campaign:c.name,type,cls,task,impact,risk,confidence,cost:c.cost,pur:c.pur,roas:c.roas,bid,next:nextCondition({type,cost:c.cost,pur:c.pur,clicks:c.clicks,atc:c.atc,checkout:c.checkout,budget})};x.score=confidenceScore(m,x);return x}
function topTermsForCampaign(m,name){const k=normName(name);return m.terms.filter(t=>String(t.Campaign||"").split(",").some(c=>normName(c)===k)).sort((a,b)=>termPriority(b)-termPriority(a)||b.cost-a.cost).slice(0,12)}
function campaignType(c){const v=String(c["Campaign type"]||c.channel||c.Type||"").toUpperCase();if(v.includes("PERFORMANCE_MAX")||v.includes("PMAX"))return"PERFORMANCE_MAX";if(v.includes("SHOPPING"))return"SHOPPING";if(v.includes("DISPLAY"))return"DISPLAY";if(v.includes("SEARCH"))return"SEARCH";return v||"UNKNOWN"}
function biddingAdvice(m,c){const budget=m.dailyBudget||DEFAULT_DAILY_BUDGET_EUR,channel=campaignType(c),current=bidLabel(c["Bidding strategy"]||c["Bid strategy"]||""),sig=signalStatsForCampaign(m,c.name),signalPurchases=Math.max(c.pur,sig.purchase),softSignals=sig.atc+sig.checkout,dirty=m.negatives.some(t=>String(t.Campaign||"").split(",").some(n=>normName(n)===normName(c.name))),noSignalSpend=c.cost>=budget*2&&!signalPurchases&&!softSignals;if(channel==="DISPLAY")return{current,reco:"Budget bas / conversions seulement si retargeting propre",reason:`Avec ${money(budget)}/j global, Display ne doit pas manger le budget d'acquisition.`};if(channel==="PERFORMANCE_MAX")return{current,reco:signalPurchases>=3?"Max conversions, +15/20% max":"Ne pas scaler l'algorithme",reason:signalPurchases>=3?"Volume suffisant pour tester une hausse progressive.":"PMax est opaque: sans achats suffisants, priorité aux assets/signaux/budget bas."};if(channel==="SHOPPING")return{current,reco:signalPurchases>=3?"Max conversions / valeur":"CPC contrôlé ou max clics prudent",reason:signalPurchases>=3?"Assez de signal achat pour pousser l'optimisation conversion.":"Shopping doit d'abord valider flux + requêtes produit avant enchères agressives."};if(channel==="SEARCH"){if(dirty)return{current,reco:"Ne pas changer d'enchères avant nettoyage",reason:"Les requêtes sont polluées: changer de stratégie amplifierait le bruit."};if(signalPurchases>=3)return{current,reco:"Maximiser les conversions",reason:"3+ achats détectés: Google a assez de signal. Hausse budget limitée à +15/20%."};if(softSignals>=2)return{current,reco:"Conserver / tester Max conversions prudemment",reason:"ATC/checkout existent, mais achat insuffisant: ne pas augmenter le budget global avant achat."};if(noSignalSpend)return{current,reco:"Max clics avec CPC cap ou manuel",reason:`À ${money(budget)}/j, objectif: apprendre proprement sans laisser l'algo brûler le budget.`};return{current,reco:"Max clics avec CPC cap",reason:"Phase exploration: collecter de la donnée et nettoyer les termes avant Max conversions."}}return{current,reco:"Pas de changement recommandé",reason:"Type de campagne non reconnu ou volume trop faible."}}
function bidLabel(v){const x=String(v||"").toUpperCase();if(!x)return"inconnue";if(x.includes("MAXIMIZE_CONVERSIONS"))return"Maximiser conversions";if(x.includes("MAXIMIZE_CONVERSION_VALUE"))return"Maximiser valeur";if(x.includes("MAXIMIZE_CLICKS"))return"Maximiser clics";if(x.includes("TARGET_ROAS"))return"ROAS cible";if(x.includes("TARGET_CPA"))return"CPA cible";if(x.includes("MANUAL_CPC"))return"CPC manuel";return String(v)}
function confidenceScore(m,x={}){let s=50;if(x.cost>=((x.budget||DEFAULT_DAILY_BUDGET_EUR)*2))s+=12;if(x.clicks>=25)s+=10;if(x.pur>=1)s+=20;if((x.atc||0)+(x.checkout||0)>0)s+=10;if(["EXCLURE","WAIT","DATA LOCK"].includes(x.type)||x.kind==="lock")s+=8;if(m&&m.globalLock&&m.globalLock.locked)s-=15;if(m&&m.missing&&m.missing.length)s-=10;if(x.type==="RIEN A FAIRE")s-=5;if(x.risk==="moyen")s-=5;if(x.risk==="eleve")s-=15;if(x.confidence==="haute")s+=8;if(x.confidence==="faible")s-=12;return Math.max(20,Math.min(95,Math.round(s)))}
function isLockType(v){return["WAIT","DATA LOCK","LOCK","RESTER"].includes(String(v||"").toUpperCase())}
function confidenceTitle(v){return isLockType(v)?"Confiance du verrou":"Confiance d'action"}
function confidenceLabel(s,lock=false){if(lock)return s>=75?"attente fortement justifiee":s>=55?"attente prudente":s>=40?"verrou faible, verifier":"verrou peu fiable";return s>=75?"assez solide pour agir":s>=55?"agir léger / surveiller":s>=40?"attendre plus de signal":"ne pas agir"}
function nextCondition(x){if(x.type==="WAIT")return"Reprendre après 48h/J+3 ou si fuite cash nette.";if(x.type==="EXCLURE")return"Si la campagne dépense encore 1 jour de budget sans ATC/checkout, réduire.";if(x.type==="SEPARER"||x.type==="ISOLER")return"Si 1 checkout apparaît, protéger; si 3 achats sur 7 jours, scale +15%.";if(x.type==="REDUIRE"||x.type==="FLUX")return"Si 25 clics supplémentaires restent sans ATC/checkout, rebuild ou couper plus fort.";if(x.type==="PROTEGER")return"Si 3 achats sur 7 jours et requêtes propres, scale +15/20% max.";if(x.type==="REECRIRE")return"Si CTR reste faible après volume suffisant, remplacer les titres mous.";return"Revoir après 25 clics supplémentaires ou apparition d'un ATC/checkout."}
function add(o,r){o.cost+=num(r.Cost);o.clicks+=num(r.Clicks);o.impr+=num(r.Impressions);o.pur+=num(r.Purchases);o.value+=num(r["Purchase value"])}
function calc(o){o.roas=o.cost?o.value/o.cost:0;o.cpa=o.pur?o.cost/o.pur:0;o.ctr=o.impr?o.clicks/o.impr:0;return o}
function missing(raw){return Object.entries(raw).filter(([k,v])=>!["advice","objectifs","actionLog"].includes(k)&&(!v||!v.length)).map(([k])=>SHEETS[k]||k)}
function hit(t,a){return a.some(x=>t.includes(x))}
function normMatch(matchType){const m=String(matchType||"").toLowerCase();if(m.includes("exact")||m==="[exact]")return"exact";if(m.includes("phrase")||m.includes("expression")||m.includes("expr"))return"phrase";if(m.includes("broad")||m.includes("large"))return"broad";return""}
function cleanKeyword(value){return String(value||"").trim().replace(/^\[/,"").replace(/\]$/,"").replace(/^"/,"").replace(/"$/,"")}
function fmtKeyword(value,matchType){const text=cleanKeyword(value);if(!text)return"";const m=normMatch(matchType);if(m==="exact")return`[${text}]`;if(m==="phrase")return`"${text}"`;return text}
function matchLabel(matchType){const m=normMatch(matchType);if(m==="exact")return"Exact";if(m==="phrase")return"Expression";if(m==="broad")return"Large";return"Match inconnu"}

function decisionGaps(){return[{t:"Historique des actions",d:"Necessaire pour savoir si une exclusion, une relance campagne ou une copy a marche a J+7."},{t:"Mapping exact keyword -> requete",d:"Google Ads ne donne pas toujours le chemin complet; ADAM reste prudent avant de couper."},{t:"Assets PMax detailles",d:"Les signaux assets restent directionnels, pas une verite absolue."}]}
function copyLine(x,max){return`<div class="copy"><span>${esc(x)}</span><span class="count">${x.length}/${max}</span></div>`}
function card(l,v,m){return`<div class="card"><div class="label">${l}</div><div class="value">${v}</div><div class="meta">${esc(m||"")}</div></div>`}
function evidenceMetrics(x,ctx){const e=evidence(x,ctx);return`${e.base?`<span class="metric">Base <b>${esc(e.base)}</b></span>`:""}<span class="metric">Fiabilité <b>${esc(e.level)}</b></span><span class="metric">Action <b>${esc(e.action)}</b></span>`}
function evidence(x,ctx=""){const impr=num(x.impr??x.impressions??x.Impressions),clicks=num(x.clicks??x.Clicks),cost=num(x.cost??x.Cost),signal=num(x.pur??x.purchase??x.purchases??x.Purchases)+num(x.checkout??x.Checkout)+num(x.atc??x.ATC),channel=String(x.channel||x["Campaign type"]||assetChannel(x)||"").toUpperCase(),intent=x.intent||classify(x.term||x.name||""),ctr=num(x.ctr);let level="faible",action="observer",why="volume faible";if(clicks>=100||cost>=100||impr>=3000){level="forte";action="agir fort";why="volume fort"}else if(clicks>=50||cost>=50||impr>=1000){level="moyenne";action="agir léger";why="volume exploitable"}else if(clicks>=25||cost>=25||impr>=300){level="moyenne";action="surveiller";why="signal moyen"}else if(clicks>=10||cost>=10){level="faible";action="surveiller";why="signal faible"}if(ctx==="query"&&["CONCURRENT","CHAUD","COEUR LARGE"].includes(intent)&&(clicks>=25||cost>=25))action="agir léger";if(ctx==="signal"&&signal>0&&["CONCURRENT","CHAUD","COMMERCIAL","COEUR LARGE"].includes(intent))action="agir léger";if(channel==="DISPLAY"&&cost<50&&!signal){level=impr>=1000?"lecture forte / business faible":"faible";action="surveiller";why="Display faible spend"}if(signal>0&&action==="agir fort")action="agir léger";if(signal>0&&level==="faible"){level="moyenne";action=action==="observer"?"surveiller":action}if(ctx==="creative"){if(signal>0){action="protéger / décliner"}else if(channel==="DISPLAY"&&cost<25){level=impr>=1000?"lecture forte / business faible":"faible";action="observer";why="Display faible spend"}else if(["RETIRER","REECRIRE","REMPLACER"].includes(String(x.type||""))){action="tester remplacement"}else if(ctr>=.08&&clicks>=10||String(x.type||"")==="SURVEILLER"){action="garder en test"}else if(action==="agir fort"){action="surveiller"}if(impr<300&&!signal){level="faible";action="observer";why="CTR non jugeable"}}const parts=[];if(impr)parts.push(`${fm(impr)} impr.`);if(clicks)parts.push(`${fm(clicks)} clics`);if(cost)parts.push(money(cost));return{level,action,why,base:parts.join(" · ")}}
function scoreCard(l,cur,prev,type="num",positiveUp=true){if(l==="CPA"&&!num(cur))return`<div class="card"><div class="label">${esc(l)}</div><div class="value">-</div><div class="ref">Ref: ${esc(fmtType(prev,type,true))}</div><div class="delta bad">0 achat, CPA non lisible</div></div>`;const c=compareInfo(num(cur),num(prev),type,positiveUp),value=fmtType(cur,type,false);return`<div class="card"><div class="label">${esc(l)}</div><div class="value">${value}</div><div class="ref">${esc(c.ref)}</div><div class="delta ${c.cls}">${c.up?"▲":"▼"} ${esc(c.delta)}</div></div>`}
function fmtType(v,type,asRef=false){if(type==="money")return money0(v);if(type==="pct")return asRef?`${(num(v)*100).toFixed(2)}%`:pct(v);if(type==="x")return rt0(v);return fm(v)}
function pill(v){const c=String(v).toLowerCase();return`<span class="pill ${c}">${esc(v)}</span>`}function conf(v){const c=String(v).toLowerCase();return`<span class="pill ${c==="high"?"good":c==="medium"?"warn":"bad"}">${esc(v)}</span>`}
function paras(t){return String(t||"").split(/\n\s*\n/).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")}
function roasNote(r){return r>=4?"Scale possible si volume":r>=3?"Correct, nettoyer":r>=2?"Trop juste pour scaler":"Cash a proteger"}
function num(x){const n=Number(x||0);return isNaN(n)?0:n}function fm(x){return NF.format(Math.round(num(x)))}function money(x){const n=num(x);return n?Math.abs(n)<1?EU_CENTS.format(n):EU.format(n):"-"}function money0(x){const n=num(x);return n&&Math.abs(n)<1?EU_CENTS.format(n):EU.format(n)}function rt(x){return x?num(x).toFixed(2):"-"}function rt0(x){return num(x).toFixed(2)}function pct(x){return x?`${(num(x)*100).toFixed(1)}%`:"-"}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
