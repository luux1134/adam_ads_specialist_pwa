<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f1a17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ADAM">
  <title>ADAM Ads Specialist</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#1f1a17;--card:#26211e;--card2:#332e2c;--accent:#f4d8a8;--txt:#fcf8f1;--sec:#908b84;--border:#332e2c;--g:#4caf7d;--r:#e05c5c;--o:#e8a64c;--b:#65b8ff}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--txt);font-family:"Plus Jakarta Sans",system-ui,sans-serif;font-weight:400}
    button{font:inherit}.wrap{min-height:100vh;background:var(--bg);padding:18px 14px 40px}.shell{max-width:1120px;margin:0 auto}
    .hdr{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .brand{display:flex;align-items:center;gap:10px}.mark{display:none}.name{font-family:"Cormorant Garamond",serif;font-size:23px;font-weight:300;font-style:italic;color:var(--accent);letter-spacing:.1em;white-space:nowrap;line-height:1}.sub{font-size:10px;color:var(--sec);letter-spacing:.16em;text-transform:uppercase;margin-top:4px}
    .stamp{text-align:right;font-size:10px;color:var(--sec);letter-spacing:.16em;text-transform:uppercase;line-height:1.6}.stamp b{display:inline-block;margin-top:4px;color:var(--accent);font-weight:400}
    .tabs{position:sticky;top:0;z-index:5;display:flex;gap:3px;margin-bottom:20px;background:rgba(38,33,30,.96);padding:4px;border:1px solid var(--border);border-radius:8px;overflow-x:auto;scrollbar-width:none;backdrop-filter:blur(12px)}.tabs::-webkit-scrollbar{display:none}
    .tab{padding:8px 13px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sec);cursor:pointer;border-radius:5px;border:0;background:transparent;white-space:nowrap}.tab:hover{color:var(--txt);background:var(--card2)}.tab.on{color:#1f1a17;background:var(--accent)}
    .view{display:none}.view.on{display:block}.sec{font-size:9px;color:var(--sec);letter-spacing:.2em;text-transform:uppercase;margin:20px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
    .sg{font-size:10px;color:var(--sec);letter-spacing:.15em;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px}.sg:after{content:"";flex:1;height:1px;background:var(--border)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:4px}.card{min-height:108px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;overflow:hidden}.label{font-size:9px;color:var(--sec);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}.value{font-family:"Cormorant Garamond",serif;font-size:27px;font-weight:300;font-style:italic;color:var(--accent);line-height:1;margin-bottom:5px}.meta{font-size:10px;color:var(--sec);line-height:1.4;margin-top:0}
    .pill{font-size:9px;letter-spacing:.12em;text-transform:uppercase;border-radius:4px;padding:4px 10px;white-space:nowrap;font-weight:600;display:inline-flex;align-items:center;gap:6px}.fix,.bad{background:rgba(224,92,92,.18);color:var(--r)}.scale,.good{background:rgba(76,175,125,.16);color:var(--g)}.hold,.warn{background:rgba(232,166,76,.18);color:var(--o)}.investigate,.info{background:rgba(101,184,255,.15);color:var(--b)}.neutral{background:rgba(144,139,132,.15);color:var(--sec)}
    .hero{background:linear-gradient(180deg,rgba(244,216,168,.08),rgba(38,33,30,0));border:1px solid rgba(244,216,168,.22);border-radius:8px;padding:15px 16px;margin-bottom:12px;overflow:hidden}.heroTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:9px;flex-wrap:wrap}.heroTitle{font-size:10px;color:var(--accent);letter-spacing:.16em;text-transform:uppercase}.priority{font-size:13px;color:var(--txt);line-height:1.45;font-weight:500;min-width:0;word-break:break-word;max-width:760px}.advice p{font-size:12px;color:var(--txt);line-height:1.7;margin:0 0 9px;max-width:75ch}.advice p:last-child{margin-bottom:0}
    .row{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:11px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:7px}.rmain{min-width:0;flex:1}.rname{font-size:12px;color:var(--txt);font-weight:500;word-break:break-word}.rnote{font-size:10px;color:var(--sec);line-height:1.5;margin-top:4px;overflow-wrap:anywhere}.metrics{display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}.metric{font-size:10px;color:var(--sec);white-space:nowrap}.metric b{font-family:"Cormorant Garamond",serif;font-size:15px;font-style:italic;color:var(--accent);font-weight:300}
    .action{font-size:10px;color:var(--accent);line-height:1.45;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);overflow-wrap:anywhere}.copy{font-family:"Plus Jakarta Sans",system-ui,sans-serif;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--txt);padding:11px 14px;margin-bottom:7px;font-size:12px;line-height:1.5;display:flex;justify-content:space-between;gap:10px;overflow-wrap:anywhere}.count{color:var(--sec);font-size:10px;white-space:nowrap}.empty{background:var(--card);border:1px dashed var(--border);border-radius:8px;padding:16px;color:var(--sec);font-size:12px;line-height:1.6;margin-bottom:8px}.loading{min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--accent);font-family:"Cormorant Garamond",serif;font-size:28px;font-style:italic}
    @media(max-width:640px){.wrap{padding:14px 10px 28px}.name{font-size:20px}.hdr{align-items:flex-start}.stamp{text-align:left}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.card{padding:12px;min-height:100px}.value{font-size:24px}.row{flex-direction:column;align-items:flex-start}.metrics{width:100%;justify-content:flex-start;gap:7px}.metric{white-space:normal}.copy{flex-direction:column}.count{white-space:normal}.priority{font-size:12px}.advice p{font-size:11px}.tab{padding:8px 13px}}
  </style>
</head>
<body>
<div id="app" class="loading">ADAM charge les signaux Ads...</div>
<script>
const API_KEY="AIzaSyADK3alDzNTsEkbKGVDbrdHYBj0esGF0KU";
const SHEET_ID="17j732Xnp48sOWR_ignS3pgc5eKL4OPCJwUJWKH5Euv4";
const SHEETS={advice:"ADAM_Advice",account:"GAds_Account_Daily",campaigns:"GAds_Campaigns",adGroups:"GAds_AdGroups",keywords:"GAds_Keywords",terms:"GAds_SearchTerms",pmaxTerms:"GAds_PMax_SearchTerms",ads:"GAds_Ads",adAssets:"GAds_AdAssets",assetGroups:"GAds_AssetGroups",assetGroupAssets:"GAds_AssetGroupAssets",devices:"GAds_Devices",hours:"GAds_Hours",locations:"GAds_Locations",landing:"GAds_LandingPages"};
const CKEY="adam-cache-v3",TTL=36e5;
const app=document.getElementById("app");
const NF=new Intl.NumberFormat("fr-FR");
const EU=new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0});

document.addEventListener("DOMContentLoaded",init);
async function init(){
  if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").then(r=>r.update()).catch(()=>{});
  try{render(await load());}catch(e){const c=cacheRead();if(c)render(c.d,true);else app.innerHTML=`<div class="wrap"><div class="empty">Erreur chargement ADAM.<br>${esc(e.message)}</div></div>`}
}
async function load(){
  const c=cacheRead();if(c&&Date.now()-c.t<TTL)return c.d;
  const pairs=await Promise.all(Object.entries(SHEETS).map(async([k,n])=>[k,await fetchSheet(n)]));
  const data=Object.fromEntries(pairs);cacheWrite(data);return data;
}
async function fetchSheet(name){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(name)}!A:Z?valueRenderOption=UNFORMATTED_VALUE&key=${API_KEY}`;
  const res=await fetch(url);if(!res.ok){if(res.status===400||res.status===404)return[];throw new Error(`${name}:${res.status}`)}
  const values=(await res.json()).values||[];return rowsToObjects(values);
}
function rowsToObjects(values){if(!values.length)return[];const headers=values[0].map(x=>String(x||"").trim());return values.slice(1).filter(r=>r.some(Boolean)).map(r=>{const o={};headers.forEach((h,i)=>o[h]=dateHeader(h)?normDate(r[i]):r[i]??"");return o})}
function dateHeader(h){return String(h).toLowerCase()==="date"}function normDate(v){if(typeof v==="number"){const d=new Date(Math.round((v-25569)*86400*1000));return d.toISOString().slice(0,10)}return String(v||"").slice(0,10)}
function cacheRead(){try{return JSON.parse(sessionStorage.getItem(CKEY)||"")}catch{return null}}function cacheWrite(d){try{sessionStorage.setItem(CKEY,JSON.stringify({t:Date.now(),d}))}catch{}}

function render(raw,offline=false){
  const m=model(raw);app.className="wrap";app.innerHTML=`<div class="shell">
    <div class="hdr"><div class="brand"><div class="mark">A</div><div><div class="name">ADAM</div><div class="sub">Ads Decision & Acquisition Manager</div></div></div><div class="stamp">${offline?"Cache local":"Google Ads Specialist"}<br><b>${m.latest||"data manquante"}</b></div></div>
    <div class="tabs">${tab("cmd","Command",true)}${tab("waste","Waste")}${tab("neg","Negatives")}${tab("terms","Search Terms")}${tab("camps","Campaigns")}${tab("keys","Keywords")}${tab("creative","Creative")}${tab("struct","Structure")}${tab("data","Data")}</div>
    ${vCommand(m)}${vWaste(m)}${vNegatives(m)}${vTerms(m)}${vCampaigns(m)}${vKeywords(m)}${vCreative(m)}${vStructure(m)}${vData(m)}
  </div>`}
function tab(id,label,on=false){return`<button class="tab ${on?"on":""}" onclick="sw('${id}',this)">${label}</button>`}
function sw(id,btn){document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));document.querySelector(`#v-${id}`).classList.add("on");document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));btn.classList.add("on");scrollTo(0,0)}

function model(raw){
  const latest=latestDate([raw.campaigns,raw.terms,raw.pmaxTerms,raw.account].flat());
  const s=latest?shift(latest,-6):"",ps=latest?shift(latest,-13):"",pe=latest?shift(latest,-7):"";
  const campaigns=range(raw.campaigns,s,latest),terms=range(raw.terms,s,latest),pmax=range(raw.pmaxTerms,s,latest),keywords=range(raw.keywords,s,latest),ads=range(raw.ads,s,latest),assetGroups=range(raw.assetGroups,s,latest);
  const prevCampaigns=range(raw.campaigns,ps,pe),prevTerms=range(raw.terms,ps,pe),prevKeywords=range(raw.keywords,ps,pe);
  const total=sumPerf(campaigns),prevTotal=sumPerf(prevCampaigns),advice=latestAdvice(raw.advice);
  const termRows=aggregateTerms(terms.concat(pmax));
  const campRows=withPrevious(aggregateBy(campaigns,["Campaign"],"campaign"),aggregateBy(prevCampaigns,["Campaign"],"campaign"));
  const keyRows=aggregateBy(keywords,["Keyword","Match type","Campaign","Ad group"],"keyword");
  const prevKeyRows=aggregateBy(prevKeywords,["Keyword","Match type","Campaign","Ad group"],"keyword");
  const m={raw,latest,total,prevTotal,trend:trend(total,prevTotal),advice,terms:termRows,campaigns:campRows,keywords:keyRows,prevKeywords:prevKeyRows,ads,assetGroups,missing:missing(raw)};
  m.waste=waste(termRows,campRows,keyRows);m.opps=opportunities(termRows,campRows,keyRows);m.negatives=negativeKeywords(termRows);m.creative=creativeDiagnosis(m);m.modes=modeSummary(campRows);
  return m;
}
function vCommand(m){const a=m.advice;return`<div class="view on" id="v-cmd"><div class="sec">Command Center</div>${a?`<div class="hero"><div class="heroTop"><div><div class="heroTitle">Decision du jour</div><div class="priority">${esc(a.Priority||"")}</div></div><div>${pill(a.Verdict||"INVESTIGATE")} ${conf(a.Confidence||"Low")}</div></div><div class="advice">${paras(a.Advice)}</div></div>`:`<div class="empty">Aucune ligne ADAM_Advice. Lance syncAdamAdvice apres la collecte Ads.</div>`}
  <div class="sg">Score rapide 7 jours</div><div class="grid">${card("Spend",money(m.total.cost),delta(m.total.cost,m.prevTotal.cost,"money"))}${card("Revenue Ads",money(m.total.value),delta(m.total.value,m.prevTotal.value,"money"))}${card("ROAS",rt(m.total.roas),delta(m.total.roas,m.prevTotal.roas,"x"))}${card("Purchases",fm(m.total.pur),m.total.pur>=3?"Volume exploitable":"Volume faible")}${card("CPA",money(m.total.cpa),delta(m.total.cpa,m.prevTotal.cpa,"money",false))}${card("CTR",pct(m.total.ctr),delta(m.total.ctr,m.prevTotal.ctr,"pct"))}</div>
  <div class="sg">Aujourd'hui : 3 actions max</div>${priorityRows(m).map(actionRow).join("")||`<div class="empty">Pas assez de donnees pour prioriser.</div>`}
  <div class="sg">Mode du compte</div><div class="grid">${card("Scale",fm(m.modes.scale),"Campagnes pretes")}${card("Validation",fm(m.modes.validation),"Signaux partiels")}${card("Reduce",fm(m.modes.reduce),"Cash a proteger")}${card("Rebuild",fm(m.modes.rebuild),"Structure a reprendre")}</div></div>`}
function vWaste(m){return`<div class="view" id="v-waste"><div class="sec">Waste Detector</div><div class="grid">${card("Waste estime",money(m.waste.total),"Spend sans achat/signaux")}${card("Termes a exclure",fm(m.waste.toxic.length),"Low-cost clair")}${card("Campagnes sans achat",fm(m.waste.campaigns.length),"Spend >= 50 EUR")}${card("Keywords faibles",fm(m.waste.keywords.length),"Spend >= 25 EUR")}</div><div class="sg">Fuites principales</div>${m.waste.rows.map(wasteRow).join("")||`<div class="empty">Aucune fuite majeure detectee avec les seuils V1.</div>`}</div>`}
function vNegatives(m){return`<div class="view" id="v-neg"><div class="sec">Negative Keyword Manager</div><div class="grid">${card("A exclure",fm(m.negatives.length),"Exact / expression")}${card("Risque faible",fm(m.negatives.filter(x=>x.risk==="faible").length),"Peu de risque business")}${card("A isoler",fm(m.terms.filter(x=>x.intent==="CONCURRENT").length),"Concurrents")}${card("Objections",fm(m.terms.filter(x=>x.intent==="OBJECTION").length),"Ne pas exclure auto")}</div><div class="sg">Exclusions recommandees</div>${m.negatives.map(negativeRow).join("")||`<div class="empty">Aucune exclusion prioritaire detectee.</div>`}</div>`}
function vTerms(m){return`<div class="view" id="v-terms"><div class="sec">Search Terms Copilot</div>${m.terms.slice(0,50).map(termRow).join("")||`<div class="empty">Données search terms indisponibles.</div>`}</div>`}
function vCampaigns(m){return`<div class="view" id="v-camps"><div class="sec">Campaign Decisions</div><div class="grid">${card("Scale",fm(m.modes.scale),"3+ achats et ROAS OK")}${card("Validation",fm(m.modes.validation),"Encore fragile")}${card("Reduce",fm(m.modes.reduce),"Spend sans assez de retour")}${card("Rebuild",fm(m.modes.rebuild),"Fuite nette")}</div><div class="sg">Modes par campagne</div>${m.campaigns.map(campaignRow).join("")||`<div class="empty">Données campagnes indisponibles.</div>`}</div>`}
function vKeywords(m){return`<div class="view" id="v-keys"><div class="sec">Keywords & Ad Groups</div>${m.keywords.slice(0,60).map(keywordRow).join("")||`<div class="empty">Données keywords indisponibles.</div>`}</div>`}
function vCreative(m){return`<div class="view" id="v-creative"><div class="sec">Creative Lab</div><div class="hero"><div class="heroTop"><div><div class="heroTitle">Diagnostic creatif</div><div class="priority">${esc(m.creative.problem)}</div></div><span class="pill ${m.creative.cls}">${m.creative.mode}</span></div><div class="advice"><p>${esc(m.creative.action)}</p></div></div><div class="sg">Titres contextuels</div>${m.creative.headlines.map(x=>copyLine(x,30)).join("")}<div class="sg">Descriptions contextuelles</div>${m.creative.descriptions.map(x=>copyLine(x,90)).join("")}<div class="sg">Assets visuels</div>${assetBriefs().map(x=>`<div class="row"><div class="rmain"><div class="rname">${esc(x.t)}</div><div class="rnote">${esc(x.d)}</div></div><span class="pill info">${x.k}</span></div>`).join("")}</div>`}
function vStructure(m){return`<div class="view" id="v-struct"><div class="sec">Structure Builder</div>${structure().map(s=>`<div class="row"><div class="rmain"><div class="rname">${esc(s.c)}</div><div class="rnote">${esc(s.g)}</div><div class="action">${esc(s.a)}</div></div><span class="pill ${s.cls}">${s.tag}</span></div>`).join("")}</div>`}
function vData(m){return`<div class="view" id="v-data"><div class="sec">Data Quality</div><div class="grid">${card("Derniere date",m.latest||"-","Google Ads")}${card("Onglets manquants",fm(m.missing.length),m.missing.slice(0,3).join(", ")||"OK")}${card("Rows campagnes",fm(m.raw.campaigns.length),"GAds_Campaigns")}${card("Rows terms",fm(m.raw.terms.length+m.raw.pmaxTerms.length),"Search + PMax")}</div><div class="sg">Manquants</div>${m.missing.map(x=>`<div class="row"><div class="rname">${esc(x)}</div><span class="pill investigate">Missing</span></div>`).join("")||`<div class="empty">Sources ADAM principales presentes.</div>`}<div class="sg">Limites de decision V1</div>${decisionGaps().map(x=>`<div class="row"><div class="rmain"><div class="rname">${esc(x.t)}</div><div class="rnote">${esc(x.d)}</div></div><span class="pill investigate">A connecter</span></div>`).join("")}</div>`}

function priorityRows(m){const out=[];if(m.missing.includes("GAds_Campaigns"))out.push({t:"Verifier la collecte Ads",n:"GAds_Campaigns est vide ou absent.",k:"INVESTIGATE",c:"investigate",i:"eleve",r:"faible",cf:"haute"});if(m.negatives.length)out.push({t:"Exclure uniquement les requetes low-cost exactes",n:m.negatives.slice(0,4).map(x=>`${x.term} (${x.match})`).join(", "),k:"EXCLURE",c:"bad",i:"eleve",r:"faible",cf:"haute"});if(m.waste.campaigns.length)out.push({t:"Nettoyer avant de couper la campagne",n:`${m.waste.campaigns[0].name} depense ${money(m.waste.campaigns[0].cost)} sans achat. D abord search terms, puis budget.`,k:"FIX",c:"bad",i:"eleve",r:"moyen",cf:"moyenne"});if(m.opps.hot.length)out.push({t:"Isoler une requete commerciale chaude",n:`${m.opps.hot[0].term} montre un signal utile. Creer annonce dediee, pas scale aveugle.`,k:"ISOLER",c:"good",i:"moyen",r:"faible",cf:"moyenne"});if(m.creative.mode!=="HOLD")out.push({t:"Ajouter des titres lies au probleme detecte",n:m.creative.action,k:"CREA",c:"info",i:"moyen",r:"faible",cf:"moyenne"});return out.slice(0,3)}
function actionRow(a){return`<div class="row"><div class="rmain"><div class="rname">${esc(a.t)}</div><div class="rnote">${esc(a.n)}</div><div class="action">Impact ${esc(a.i||"moyen")} · Risque ${esc(a.r||"moyen")} · Confiance ${esc(a.cf||"moyenne")}</div></div><span class="pill ${a.c}">${a.k}</span></div>`}
function wasteRow(x){return`<div class="row"><div class="rmain"><div class="rname">${esc(x.name)}</div><div class="rnote">${esc(x.reason)}</div><div class="action">${esc(x.action)}</div></div><div class="metrics"><span class="metric">Cost <b>${money(x.cost)}</b></span><span class="metric">Clicks <b>${fm(x.clicks)}</b></span><span class="metric">Conv <b>${fm(x.pur)}</b></span></div></div>`}
function termRow(r){const d=termDecision(r);return`<div class="row"><div class="rmain"><div class="rname">${esc(r.term)}</div><div class="rnote">${esc(r.intent)} · ${esc(d)}</div></div><div class="metrics"><span class="metric">Cost <b>${money(r.cost)}</b></span><span class="metric">CTR <b>${pct(r.ctr)}</b></span><span class="metric">Conv <b>${fm(r.pur)}</b></span><span class="metric">ROAS <b>${rt(r.roas)}</b></span></div></div>`}
function campaignRow(r){const mode=campaignMode(r),d=campaignDecision(r);return`<div class="row"><div class="rmain"><div class="rname">${esc(r.name)}</div><div class="rnote">${esc(d)}</div><div class="action">Mode ${mode.label} · Sortie: ${esc(mode.exit)}</div></div><div class="metrics"><span class="pill ${mode.cls}">${mode.label}</span><span class="metric">Cost <b>${money(r.cost)}</b></span><span class="metric">Conv <b>${fm(r.pur)}</b></span><span class="metric">ROAS <b>${rt(r.roas)}</b></span><span class="metric">CPA <b>${money(r.cpa)}</b></span></div></div>`}
function keywordRow(r){const d=r.cost>=25&&!r.pur?"Reduire/pause: depense sans achat.":r.pur&&r.roas>=3?"Garder, isoler si intention precise.":"Surveiller jusqu'a volume suffisant.";return`<div class="row"><div class="rmain"><div class="rname">${esc(r.name)}</div><div class="rnote">${esc(r["Match type"]||"")} · ${esc(d)}</div></div><div class="metrics"><span class="metric">Cost <b>${money(r.cost)}</b></span><span class="metric">Conv <b>${fm(r.pur)}</b></span><span class="metric">ROAS <b>${rt(r.roas)}</b></span></div></div>`}

function negativeRow(x){return`<div class="row"><div class="rmain"><div class="rname">${esc(x.term)}</div><div class="rnote">${esc(x.reason)}</div><div class="action">Exclusion ${esc(x.match)} · Niveau ${esc(x.level)} · Risque ${esc(x.risk)}</div></div><span class="pill bad">EXCLURE</span></div>`}
function negativeKeywords(terms){return terms.filter(t=>t.intent==="TOXIQUE"&&t.cost>0).map(t=>negativeRule(t)).sort((a,b)=>b.cost-a.cost).slice(0,30)}
function negativeRule(t){const s=String(t.term||"").toLowerCase();let match="exact",level="campagne",risk="faible",reason="Requete low-cost claire, peu compatible avec HOLIAE premium.";if(hit(s,["amazon","temu","shein","aliexpress","pas cher","gratuit","occasion"]))match="expression";if(hit(s,["amazon","temu","shein","aliexpress"]))level="compte";if(s==="action"||s.includes(" action ")){match="exact";level="campagne";reason="Ne pas exclure le mot action seul au compte. Exclure seulement la requete exacte liee a la marque Action."}return{...t,match,level,risk,reason}}
function campaignMode(r){if(r.cost>=100&&!r.pur)return{label:"REBUILD",cls:"bad",exit:"reprendre structure/search terms avant nouveau budget"};if(r.cost>=50&&!r.pur)return{label:"REDUCE",cls:"bad",exit:"reduire apres nettoyage des requetes"};if(r.pur>=3&&r.roas>=4)return{label:"SCALE",cls:"good",exit:"+15/20% max puis relecture 48h"};if(r.pur>=1||r.clicks>=20)return{label:"VALIDATION",cls:"warn",exit:"attendre 3 achats ou signal ATC solide"};return{label:"EXPLORATION",cls:"investigate",exit:"collecter volume sans decision lourde"}}
function modeSummary(camps){return camps.reduce((a,c)=>{const k=campaignMode(c).label.toLowerCase();a[k]=(a[k]||0)+1;return a},{scale:0,validation:0,reduce:0,rebuild:0,exploration:0})}
function withPrevious(current,previous){const prev={};previous.forEach(p=>prev[p.name]=p);return current.map(c=>({...c,prev:prev[c.name]||null}))}
function trend(cur,prev){return{cost:change(cur.cost,prev.cost),value:change(cur.value,prev.value),roas:change(cur.roas,prev.roas),cpa:change(cur.cpa,prev.cpa),ctr:change(cur.ctr,prev.ctr)}}
function change(a,b){return b?(a-b)/Math.abs(b):null}
function delta(cur,prev,type="x",positiveUp=true){if(!prev)return"vs 7J avant: -";const raw=(cur-prev)/Math.abs(prev),good=positiveUp?raw>=0:raw<=0,val=type==="money"?money(Math.abs(cur-prev)):type==="pct"?`${(Math.abs(cur-prev)*100).toFixed(1)}pt`:type==="x"?`${Math.abs(cur-prev).toFixed(2)}x`:`${Math.round(Math.abs(raw)*100)}%`;return`${raw>=0?"+":"-"}${val} vs 7J avant ${good?"OK":"warning"}`}
function creativeDiagnosis(m){if(m.total.clicks>=20&&m.total.ctr<.025)return{mode:"CTR BAS",cls:"warn",problem:"Les annonces n accrochent pas assez les requetes.",action:"Renforcer les hooks preuve: 4 longueurs d onde, 488 LEDs, puissance, essai 60 jours.",headlines:["Masque LED Anti-Age","4 Longueurs d'Onde","488 LEDs Ciblees","Spa-Tech a Domicile","Essai 60 Jours"],descriptions:["RE:GEN I combine puissance LED et rituel premium de 10 minutes par jour.","4 longueurs d onde, 488 LEDs et essai 60 jours. Decouvrez HOLIAE."]};if(m.total.clicks>=30&&!m.total.pur)return{mode:"CLICS SANS VENTE",cls:"bad",problem:"Le trafic clique mais ne prouve pas encore l intention achat.",action:"Ne pas scaler. Nettoyer search terms et tester des annonces plus filtrantes sur le prix premium/preuve.",headlines:["Masque LED Premium","RE:GEN I par HOLIAE","Soin LED Sans Compromis","Essai 60 Jours","Paiement 3x Sans Frais"],descriptions:["Un masque LED premium pour celles qui veulent puissance, preuve et rituel simple.","Prix premium, technologie serieuse, essai 60 jours. Pas un gadget low-cost."]};if(m.terms.some(t=>t.intent==="CONCURRENT"))return{mode:"CONCURRENT",cls:"investigate",problem:"Des requetes concurrentes apparaissent. Elles ne doivent pas rester dans le non-marque standard.",action:"Creer un angle comparaison separe, sans melanger avec Search Anti-Age.",headlines:["Alternative a Nooance","Comparer Masques LED","RE:GEN I vs Le Reste","4 Couleurs + Puissance","Masque LED Premium"],descriptions:["Comparez puissance, longueurs d onde et garanties avant de choisir votre masque LED.","HOLIAE combine anti-age, eclat, rougeurs et imperfections dans un seul rituel."]};return{mode:"HOLD",cls:"good",problem:"Pas de probleme creatif prioritaire detecte avec les donnees disponibles.",action:"Garder les assets preuve et surveiller les prochaines requetes qui depensent.",headlines:headlines(),descriptions:descriptions()}}
function waste(terms,camps,keys){const toxic=terms.filter(t=>t.intent==="TOXIQUE"&&t.cost>0),campaigns=camps.filter(c=>c.cost>=50&&!c.pur),keywords=keys.filter(k=>k.cost>=25&&!k.pur);const rows=[];toxic.slice(0,8).forEach(t=>rows.push({name:t.term,reason:"Requete low-cost claire.",action:"Ajouter en negatif exact/expression selon volume.",cost:t.cost,clicks:t.clicks,pur:t.pur}));campaigns.slice(0,8).forEach(c=>rows.push({name:c.name,reason:"Campagne avec spend significatif sans achat.",action:"Reduire, isoler ou inspecter search terms avant nouveau budget.",cost:c.cost,clicks:c.clicks,pur:c.pur}));keywords.slice(0,8).forEach(k=>rows.push({name:k.name,reason:"Mot-cle depense sans conversion.",action:"Pause ou passer en exact si l'intention est bonne.",cost:k.cost,clicks:k.clicks,pur:k.pur}));return{toxic,campaigns,keywords,rows:rows.sort((a,b)=>b.cost-a.cost),total:rows.reduce((s,x)=>s+x.cost,0)}}
function opportunities(terms,camps,keys){return{hot:terms.filter(t=>["CHAUD","COMMERCIAL"].includes(t.intent)&&(t.pur||t.clicks>=3)).sort((a,b)=>b.value-a.value||b.cost-a.cost),scale:camps.filter(c=>c.pur>=3&&c.roas>=3),keywords:keys.filter(k=>k.pur&&k.roas>=3)}}
function classify(term){const t=String(term||"").toLowerCase();if(hit(t,["action","amazon","temu","shein","aliexpress","gratuit","pas cher","occasion"]))return"TOXIQUE";if(hit(t,["danger","effet secondaire","effets secondaires","yeux","cancer","avis negatif"]))return"OBJECTION";if(hit(t,["nooance","currentbody","foreo","silk","dennis gross"]))return"CONCURRENT";if(hit(t,["acheter","meilleur","prix","comparatif","choisir","anti age","anti-age"]))return"COMMERCIAL";if(hit(t,["masque led visage","masque led anti age","masque led rides","lumiere rouge visage"]))return"CHAUD";if(hit(t,["comment","fonctionne","efficace","avis"]))return"INFORMATIONNEL";return"A_CLASSER"}
function termDecision(r){if(r.intent==="TOXIQUE")return"Exclure prioritaire.";if(r.intent==="OBJECTION")return"Ne pas exclure auto: envoyer vers preuve/securite si volume.";if(r.intent==="CONCURRENT")return"Isoler dans campagne concurrent dediee.";if(r.intent==="CHAUD")return"Isoler + annonce dediee si volume.";if(r.intent==="COMMERCIAL")return"Garder et surveiller CPA.";return"Surveiller, pas assez clair."}
function campaignDecision(r){if(!r.cost)return"Aucune depense.";if(r.cost>=50&&!r.pur)return"Reduire ou inspecter: spend sans achat.";if(r.pur>=3&&r.roas>=4)return"Scaler prudemment +15/20%, pas plus.";if(r.pur>=1&&r.roas>=3)return"Garder, nettoyer les termes.";if(r.roas&&r.roas<2)return"Proteger cash: optimiser avant budget.";return"Volume insuffisant: attendre avant decision lourde."}

function latestAdvice(rows){return(rows||[]).slice().sort((a,b)=>String(b.Date).localeCompare(String(a.Date)))[0]||null}
function latestDate(rows){return[...new Set((rows||[]).map(r=>r.Date).filter(isDate))].sort().pop()||""}
function range(rows,s,e){if(!s||!e)return rows||[];return(rows||[]).filter(r=>r.Date>=s&&r.Date<=e)}
function shift(d,off){const x=new Date(d+"T00:00:00Z");x.setUTCDate(x.getUTCDate()+off);return x.toISOString().slice(0,10)}
function isDate(x){return/^\d{4}-\d{2}-\d{2}$/.test(String(x||""))}
function sumPerf(rows){const o={cost:0,clicks:0,impr:0,pur:0,value:0};(rows||[]).forEach(r=>{o.cost+=num(r.Cost);o.clicks+=num(r.Clicks);o.impr+=num(r.Impressions);o.pur+=num(r.Purchases);o.value+=num(r["Purchase value"])});o.roas=o.cost?o.value/o.cost:0;o.cpa=o.pur?o.cost/o.pur:0;o.ctr=o.impr?o.clicks/o.impr:0;return o}
function aggregateTerms(rows){const map={};(rows||[]).forEach(r=>{const k=String(r["Search term"]||"").toLowerCase();if(!k)return;if(!map[k])map[k]={term:r["Search term"],intent:classify(r["Search term"]),cost:0,clicks:0,impr:0,pur:0,value:0};add(map[k],r)});return Object.values(map).map(calc).sort((a,b)=>b.cost-a.cost)}
function aggregateBy(rows,keys,nameKey){const map={};(rows||[]).forEach(r=>{const k=keys.map(x=>r[x]||"").join("||");if(!k.trim())return;if(!map[k])map[k]={name:r[keys[0]]||"",cost:0,clicks:0,impr:0,pur:0,value:0,...r};add(map[k],r)});return Object.values(map).map(calc).sort((a,b)=>b.cost-a.cost)}
function add(o,r){o.cost+=num(r.Cost);o.clicks+=num(r.Clicks);o.impr+=num(r.Impressions);o.pur+=num(r.Purchases);o.value+=num(r["Purchase value"])}
function calc(o){o.roas=o.cost?o.value/o.cost:0;o.cpa=o.pur?o.cost/o.pur:0;o.ctr=o.impr?o.clicks/o.impr:0;return o}
function missing(raw){return Object.entries(raw).filter(([k,v])=>k!=="advice"&&(!v||!v.length)).map(([k])=>SHEETS[k]||k)}
function hit(t,a){return a.some(x=>t.includes(x))}

function decisionGaps(){return[{t:"ATC / checkout par campagne",d:"Necessaire pour distinguer trafic faible, landing faible et checkout faible."},{t:"Action Log",d:"Necessaire pour mesurer si les exclusions, copies et budgets appliques ont marche a J+7."},{t:"Assets PMax detailles",d:"Les signaux assets restent directionnels, pas une verite absolue."}]}
function headlines(){return["Masque LED 4 Couleurs","45 mW/cm2 Puissance","Rituel LED Anti-Age","Rouge + Infrarouge","RE:GEN I par HOLIAE","Essai 60 Jours","Paiement 3x Sans Frais","488 LEDs Ciblees","LED Anti-Age Premium","Spa-Tech a Domicile","4 Longueurs d'Onde","Soin LED Sans Compromis"]}
function descriptions(){return["Rouge, infrarouge, bleu et jaune dans un rituel LED premium de 10 minutes.","488 LEDs, 4 longueurs d'onde et puissance elevee. Soin LED sans compromis.","Cible rides, eclat, rougeurs et imperfections adultes avec RE:GEN I.","Livraison offerte, paiement en plusieurs fois, essai 60 jours."]}
function assetBriefs(){return[{k:"IMG",t:"Produit en action",d:"Masque allume sur visage, lumiere rouge visible, cadrage premium mais preuve claire."},{k:"IMG",t:"Preuve technologie",d:"Schema simple 4 longueurs d'onde + 488 LEDs + puissance."},{k:"VID",t:"UGC 15 secondes",d:"Femme 35-55 ans, rituel 10 minutes, objection: est-ce que ca marche vraiment ?"},{k:"LP",t:"Landing objection",d:"Page securite/efficacite pour capter les requetes danger, avis, effets secondaires."}]}
function structure(){return[{tag:"BRAND",cls:"info",c:"Campaign 1 - Brand",g:"holiae, regen i, masque holiae",a:"Budget faible, protection marque."},{tag:"MAIN",cls:"good",c:"Campaign 2 - Search Anti-Age",g:"masque led anti age, rides, lumiere rouge visage",a:"Budget principal si CPA et volume valides."},{tag:"PROBLEMS",cls:"hold",c:"Campaign 3 - Multi-problematiques",g:"acne, rougeurs, eclat, peau terne",a:"Tester par probleme avec annonces dediees."},{tag:"COMP",cls:"warn",c:"Campaign 4 - Concurrents",g:"nooance, currentbody, foreo, comparatif",a:"Jamais melanger au non-marque. LP dediee obligatoire."},{tag:"PMAX",cls:"investigate",c:"Campaign 5 - Performance Max",g:"Anti-age, Eclat, Spa domicile, Imperfections",a:"Asset groups separes, signaux audience propres."}]}
function copyLine(x,max){return`<div class="copy"><span>${esc(x)}</span><span class="count">${x.length}/${max}</span></div>`}
function card(l,v,m){return`<div class="card"><div class="label">${l}</div><div class="value">${v}</div><div class="meta">${esc(m||"")}</div></div>`}
function pill(v){const c=String(v).toLowerCase();return`<span class="pill ${c}">${esc(v)}</span>`}function conf(v){const c=String(v).toLowerCase();return`<span class="pill ${c==="high"?"good":c==="medium"?"warn":"bad"}">${esc(v)}</span>`}
function paras(t){return String(t||"").split(/\n\s*\n/).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")}
function roasNote(r){return r>=4?"Scale possible si volume":r>=3?"Correct, nettoyer":r>=2?"Trop juste pour scaler":"Cash a proteger"}
function num(x){const n=Number(x||0);return isNaN(n)?0:n}function fm(x){return NF.format(Math.round(num(x)))}function money(x){return x?EU.format(num(x)):"-"}function rt(x){return x?num(x).toFixed(2):"-"}function pct(x){return x?`${(num(x)*100).toFixed(1)}%`:"-"}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
